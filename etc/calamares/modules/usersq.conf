---
defaultGroups:
    - name: users
      must_exist: true
      system: true
    - lp
    - video
    - network
    - storage
    - power
    - rfkill
    - name: wheel
      must_exist: false
      system: true
    - audio

sudoersGroup:    wheel

autologinGroup:  autologin

sudoersConfigureWithGroup: true

setRootPassword: false

doReusePassword: false

doAutologin:    false

passwordRequirements:
    minLength: 1

allowWeakPasswords: true

allowWeakPasswordsDefault: false

user:
  shell: /bin/bash
  forbidden_names: [ root ]

hostname:
  location: EtcFile
  writeHostsFile: true
  forbidden_names: [ localhost ]

presets:
    fullName:
        editable: true
    loginName:
        editable: true
